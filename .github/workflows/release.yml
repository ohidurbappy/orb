name: Release

# Every push to main cuts a release. The version is derived from build.zig.zon
# (MAJOR.MINOR) with the workflow run number as the patch, so each release is a
# strictly-increasing semver without anyone bumping a file by hand. Bump
# MAJOR/MINOR by editing the `version` field in build.zig.zon.
on:
  push:
    branches:
      - main

permissions:
  contents: write

# Serialize releases so two quick pushes don't race on tag/asset creation.
concurrency:
  group: release
  cancel-in-progress: false

env:
  ZIG_VERSION: 0.16.0

jobs:
  # Darwin targets must build on a macOS runner: the binary @cImports system
  # headers (ifaddrs.h, sysctl) that need the macOS SDK. One macOS runner
  # cross-compiles both arm64 and x64.
  build-darwin:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Compute version
        id: version
        run: |
          base="$(grep -m1 '\.version' build.zig.zon | sed -E 's/.*"([0-9]+\.[0-9]+)\.[0-9]+".*/\1/')"
          echo "full=${base}.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
      - run: zig build test -Dversion=${{ steps.version.outputs.full }}
      - name: Build darwin binaries
        run: |
          mkdir -p dist
          for pair in "aarch64-macos:orb-darwin-arm64" "x86_64-macos:orb-darwin-x64"; do
            target="${pair%%:*}"; out="${pair##*:}"
            zig build -Dtarget="$target" -Doptimize=ReleaseSafe -Dversion=${{ steps.version.outputs.full }}
            gzip -9 -c zig-out/bin/orb > "dist/${out}.gz"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: dist-darwin
          path: dist/*.gz

  # Linux (musl, static) and Windows cross-compile cleanly from a Linux runner
  # using Zig's bundled libc.
  build-cross:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Compute version
        id: version
        run: |
          base="$(grep -m1 '\.version' build.zig.zon | sed -E 's/.*"([0-9]+\.[0-9]+)\.[0-9]+".*/\1/')"
          echo "full=${base}.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
      - run: zig build test -Dversion=${{ steps.version.outputs.full }}
      - name: Build linux + windows binaries
        run: |
          mkdir -p dist
          # target:asset-name:binary-name
          for spec in \
            "x86_64-linux-musl:orb-linux-x64:orb" \
            "aarch64-linux-musl:orb-linux-arm64:orb" \
            "x86_64-windows:orb-windows-x64.exe:orb.exe"; do
            target="$(echo "$spec" | cut -d: -f1)"
            out="$(echo "$spec" | cut -d: -f2)"
            bin="$(echo "$spec" | cut -d: -f3)"
            zig build -Dtarget="$target" -Doptimize=ReleaseSafe -Dversion=${{ steps.version.outputs.full }}
            gzip -9 -c "zig-out/bin/${bin}" > "dist/${out}.gz"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: dist-cross
          path: dist/*.gz

  release:
    needs: [build-darwin, build-cross]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute version
        id: version
        run: |
          base="$(grep -m1 '\.version' build.zig.zon | sed -E 's/.*"([0-9]+\.[0-9]+)\.[0-9]+".*/\1/')"
          echo "full=${base}.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect + checksum assets
        run: |
          mkdir -p dist
          mv artifacts/dist-*/*.gz dist/
          cd dist
          sha256sum *.gz > checksums.txt
          ls -la
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ steps.version.outputs.full }}
        run: |
          # Idempotent: a re-run reuses the run number (same tag), so refresh
          # assets instead of failing on an existing release.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.gz dist/checksums.txt --clobber
          else
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --generate-notes \
              dist/*.gz dist/checksums.txt
          fi
